<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z.E.A.L. — выбор отряда</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                linear-gradient(rgba(255, 215, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .zeal-terminal {
            max-width: 700px;
            width: 100%;
            background: #0f0f0f;
            border: 3px solid #ffd700;
            padding: 30px;
            box-shadow: 0 0 30px #ffd70033;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #ffd700;
            font-size: 48px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .header p {
            color: #ffd700;
            font-size: 14px;
            letter-spacing: 3px;
            opacity: 0.8;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 2px solid #ffd700;
            color: #ffd700;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .section-title {
            color: #ffd700;
            font-size: 20px;
            margin: 20px 0 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-left: 4px solid #ffd700;
            padding-left: 10px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #ffd700;
            color: #ffd700;
            cursor: pointer;
            transition: 0.2s;
        }

        .radio-item:hover {
            background: #2a2a2a;
            box-shadow: 0 0 10px #ffd700;
        }

        .radio-item input[type="radio"] {
            accent-color: #ffd700;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .radio-item label {
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }

        .radio-item span {
            font-size: 14px;
            color: #ffd700;
            opacity: 0.7;
        }

        .emergency-btn {
            width: 100%;
            padding: 40px;
            background: #cc0000;
            border: 3px solid #ffd700;
            color: white;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            margin: 30px 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px #ff0000; }
            50% { box-shadow: 0 0 60px #ff0000; }
            100% { box-shadow: 0 0 20px #ff0000; }
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #ffd700;
            color: #0f0;
            font-size: 14px;
        }

        .btn {
            padding: 15px 30px;
            background: transparent;
            border: 2px solid #ffd700;
            color: #ffd700;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin: 5px;
        }

        .btn:hover {
            background: #ffd700;
            color: #0a0a0a;
        }

        .btn-block {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="zeal-terminal">
        <div class="header">
            <h1>Z•E•A•L</h1>
            <p>zenith elite assault legion</p>
        </div>

        <!-- Ввод имени -->
        <input type="text" class="input-field" id="operatorName" placeholder="Ваш позывной / имя" value="Малас">

        <!-- Выбор отряда -->
        <div class="section-title">⚔️ выберите отряд</div>
        <div class="radio-group" id="squadGroup">
            <div class="radio-item">
                <input type="radio" name="squad" id="squad1" value="Лёгкий" checked>
                <label for="squad1">🏃 ЛЁГКИЙ</label>
                <span>быстрые, разведка</span>
            </div>
            <div class="radio-item">
                <input type="radio" name="squad" id="squad2" value="Средний">
                <label for="squad2">⚖️ СРЕДНИЙ</label>
                <span>баланс, универсалы</span>
            </div>
            <div class="radio-item">
                <input type="radio" name="squad" id="squad3" value="Тяжёлый">
                <label for="squad3">🛡️ ТЯЖЁЛЫЙ</label>
                <span>броня, щиты</span>
            </div>
            <div class="radio-item">
                <input type="radio" name="squad" id="squad4" value="Штурмовой">
                <label for="squad4">🔫 ШТУРМОВОЙ</label>
                <span>огонь, прорыв</span>
            </div>
            <div class="radio-item">
                <input type="radio" name="squad" id="squad5" value="Поддержка">
                <label for="squad5">🏥 ПОДДЕРЖКА</label>
                <span>медики, инженеры</span>
            </div>
            <div class="radio-item">
                <input type="radio" name="squad" id="squad6" value="Культурный десант">
                <label for="squad6">🚁 КУЛЬТУРНЫЙ ДЕСАНТ</label>
                <span>штурмовики + вертолёт</span>
            </div>
        </div>

        <!-- Красная кнопка -->
        <button class="emergency-btn" onclick="sendEmergency()">🚨 ВЫЗВАТЬ ОТРЯД</button>

        <!-- Статус -->
        <div class="status" id="status">> Ожидание команды</div>
    </div>

    <script>
        // Telegram данные
        const TOKEN = '8655630023:AAHx11sDOmY7JemehAcaLfEyP907qRgzOKM';
        const CHAT_ID = '6763299388';

        let operatorName = 'Малас';

        // Получить выбранный отряд
        function getSelectedSquad() {
            const radios = document.getElementsByName('squad');
            for (let radio of radios) {
                if (radio.checked) return radio.value;
            }
            return 'Лёгкий';
        }

        // Эмодзи для отряда
        function getSquadEmoji(squad) {
            const map = {
                'Лёгкий': '🏃',
                'Средний': '⚖️',
                'Тяжёлый': '🛡️',
                'Штурмовой': '🔫',
                'Поддержка': '🏥',
                'Культурный десант': '🚁'
            };
            return map[squad] || '⚔️';
        }

        // Отправка в Telegram
        function sendToTelegram(text) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: text
                })
            }).catch(e => console.log('TG Error:', e));
        }

        // Экстренный вызов
        function sendEmergency() {
            const nameInput = document.getElementById('operatorName').value.trim();
            operatorName = nameInput || 'Малас';

            const squad = getSelectedSquad();
            const emoji = getSquadEmoji(squad);

            const message = `${emoji} [${operatorName}] вызывает отряд: ${squad}`;

            sendToTelegram(message);
            document.getElementById('status').innerText = `> ✅ Вызван отряд: ${squad}`;
        }

        // Обновление статуса при смене радио (опционально)
        document.querySelectorAll('input[name="squad"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.getElementById('status').innerText = `> Выбран отряд: ${this.value}`;
            });
        });
    </script>
</body>
</html>
